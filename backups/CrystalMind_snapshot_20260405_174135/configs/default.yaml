# CrystalMind master configuration

data:
  n_materials: 5000
  xrd_wavelength: CuKa
  xrd_n_points: 2000
  two_theta_min: 5.0
  two_theta_max: 90.0
  two_theta_sigma: 0.1
  val_fraction: 0.15
  test_fraction: 0.15
  random_seed: 42

  augment:
    enabled: true
    gaussian_noise_std: 0.005
    poisson_noise_scale: 500.0
    peak_shift_max: 5
    intensity_scale_range: [0.8, 1.2]
    baseline_drift: true

model:
  name: CrystalMind1DResNet
  dropout: 0.4
  channels: [32, 64, 128, 256, 256]
  kernels: [15, 7, 7, 7, 7]
  strides: [2, 2, 2, 2, 1]
  dilations: [1, 1, 1, 1, 2]
  residual_blocks_per_stage: 2
  transformer:
    enabled: true
    n_layers: 1
    n_heads: 4
    ff_multiplier: 2.0
    dropout: 0.1
    max_seq_len: 128

tasks:
  crystal_system:
    type: classification
    n_classes: 7
    weight: 1.0
    loss:
      type: cross_entropy
  space_group:
    type: classification
    n_classes: 231
    weight: 1.0
    loss:
      type: focal
      gamma: 2.0

training:
  epochs: 80
  batch_size: 64
  learning_rate: 1e-3
  weight_decay: 1e-4
  label_smoothing: 0.05
  multi_task_weighting: uncertainty
  uncertainty_init_log_var: 0.0
  grad_clip: 1.0
  scheduler: cosine
  warmup_epochs: 5
  early_stopping_patience: 15

paths:
  raw_data: data/raw
  processed: data/crystal_structures.npz
  cache: data/cache
  checkpoint: outputs/checkpoints/best_model.pt
  plots: outputs/plots
  reports: outputs/reports

mlflow:
  experiment_name: CrystalMind
  tracking_uri: mlruns

explainability:
  n_gradcam_samples: 20
  target_layer: backbone.layer4
